assets:

  # -----------------------
  # КЭШ
  # -----------------------
  - asset_name: cash
    asset_class: cash
    subclass: physical_cash
    portfolio_role:
      - liquidity
      - safety_buffer

    cashflow:
      type: none
      predictability: 5

    risks:
      capital_volatility: 1
      default_risk: 1
      cashflow_risk: 5
      operational_risk: 1
      regulatory_risk: 2
      liquidity_risk: 1
      inflation_risk: 5
      currency_risk: 3
      geopolitical_risk: 3

    liquidity:
      level: 5
      time_to_cash_days: 0

    suitability:
      passive_income: 1
      capital_preservation: 3

    notes:
      - используется как резерв
      - теряет покупательную способность

  # -----------------------
  # ВКЛАД
  # -----------------------
  - asset_name: bank_deposit
    asset_class: fixed_income
    subclass: bank_deposit
    portfolio_role:
      - income
      - capital_preservation
      - liquidity

    cashflow:
      type: fixed
      predictability: 4

    risks:
      capital_volatility: 1
      default_risk: 2
      cashflow_risk: 2
      operational_risk: 1
      regulatory_risk: 3
      liquidity_risk: 2
      inflation_risk: 3
      currency_risk: 1
      geopolitical_risk: 3

    liquidity:
      level: 4
      time_to_cash_days: 1-7

    suitability:
      passive_income: 4
      capital_preservation: 4

    notes:
      - ставка не гарантирована в будущем
      - не является долгосрочным источником высокого дохода

  # -----------------------
  # НЕДВИЖИМОСТЬ
  # -----------------------
  - asset_name: residential_rental_real_estate
    asset_class: real_estate
    subclass: rental_apartment
    portfolio_role:
      - income
      - diversification
      - inflation_partial_hedge

    cashflow:
      type: semi_fixed
      predictability: 3

    risks:
      capital_volatility: 3
      default_risk: 2
      cashflow_risk: 3
      operational_risk: 4
      regulatory_risk: 3
      liquidity_risk: 5
      inflation_risk: 3
      currency_risk: 1
      geopolitical_risk: 4

    liquidity:
      level: 1
      time_to_cash_days: 90-180

    suitability:
      passive_income: 4
      capital_preservation: 4

    notes:
      - требует учета простоя
      - требует учета ремонта и capex
      - высокая концентрация капитала
      - не полностью пассивный актив

  # -----------------------
  # ДИВИДЕНДНЫЕ АКЦИИ
  # -----------------------
  - asset_name: dividend_stocks
    asset_class: equities
    subclass: dividend_equities
    portfolio_role:
      - income
      - growth
      - inflation_hedge

    cashflow:
      type: variable
      predictability: 2

    risks:
      capital_volatility: 4
      default_risk: 3
      cashflow_risk: 4
      operational_risk: 1
      regulatory_risk: 4
      liquidity_risk: 1
      inflation_risk: 2
      currency_risk: 2
      geopolitical_risk: 4

    liquidity:
      level: 5
      time_to_cash_days: 1-2

    suitability:
      passive_income: 3
      capital_preservation: 3

    notes:
      - дивиденды не гарантированы
      - высокая волатильность
      - зависит от рынка и политики компаний

  # -----------------------
  # АКЦИИ РОСТА
  # -----------------------
  - asset_name: growth_stocks
    asset_class: equities
    subclass: growth_equities
    portfolio_role:
      - growth

    cashflow:
      type: none
      predictability: 1

    risks:
      capital_volatility: 5
      default_risk: 3
      cashflow_risk: 5
      operational_risk: 1
      regulatory_risk: 4
      liquidity_risk: 1
      inflation_risk: 2
      currency_risk: 2
      geopolitical_risk: 4

    liquidity:
      level: 5
      time_to_cash_days: 1-2

    suitability:
      passive_income: 1
      capital_preservation: 2

    notes:
      - не генерируют cashflow
      - используются только для роста капитала

  # -----------------------
  # КРИПТА
  # -----------------------
  - asset_name: crypto_assets
    asset_class: crypto
    subclass: mixed_crypto
    portfolio_role:
      - speculation
      - alternative_assets
      - currency_diversification

    cashflow:
      type: none
      predictability: 1

    risks:
      capital_volatility: 5
      default_risk: 3
      cashflow_risk: 5
      operational_risk: 2
      regulatory_risk: 5
      liquidity_risk: 2
      inflation_risk: 2
      currency_risk: 4
      geopolitical_risk: 4

    liquidity:
      level: 4
      time_to_cash_days: 1-3

    suitability:
      passive_income: 1
      capital_preservation: 1

    notes:
      - высокая волатильность
      - не используется как источник дохода
      - зависит от регулирования

  # -----------------------
  # USDT / СТАБЛКОИНЫ
  # -----------------------
  - asset_name: stablecoins
    asset_class: crypto
    subclass: stablecoins
    portfolio_role:
      - liquidity
      - currency_diversification

    cashflow:
      type: none
      predictability: 3

    risks:
      capital_volatility: 2
      default_risk: 4
      cashflow_risk: 5
      operational_risk: 2
      regulatory_risk: 5
      liquidity_risk: 2
      inflation_risk: 2
      currency_risk: 3
      geopolitical_risk: 4

    liquidity:
      level: 4
      time_to_cash_days: 1

    suitability:
      passive_income: 1
      capital_preservation: 2

    notes:
      - риск эмитента
      - риск блокировки
      - не равно банковскому доллару