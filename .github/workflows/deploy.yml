name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "."
          target: "/home/SmartSavings"
          rm: false

      - name: Create .env and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /home/SmartSavings
            printf 'BOT_TOKEN=%s\nWEBAPP_URL=%s\nNGROK_AUTHTOKEN=%s\n' \
              '${{ secrets.BOT_TOKEN }}' \
              '${{ secrets.WEBAPP_URL }}' \
              '${{ secrets.NGROK_AUTHTOKEN }}' > .env
            docker compose up --build -d